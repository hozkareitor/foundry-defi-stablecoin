[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache = true
cache_path = "cache"
broadcast = "broadcast"

remappings = [
    '@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/',
    '@openzeppelin/contracts=lib/openzeppelin-contracts/contracts',
    'forge-std/=lib/forge-std/src/',
]

[fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0x01"  # String hexadecimal con comillas
dictionary_weight = 40
include_storage = true
include_push_bytes = true

[invariant]
runs = 100
depth = 100
fail_on_revert = false
call_override = false

solc_version = "0.8.34"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = true

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true